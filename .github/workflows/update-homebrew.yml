name: Update Homebrew Cask

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号 (例如: v1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag input
        id: validate-tag
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          VERSION="$(printf '%s' "$VERSION" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"

          if [[ -z "$VERSION" ]]; then
            echo "Error: tag input is empty"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: invalid tag format: $VERSION"
            exit 1
          fi

          echo "Using tag: $VERSION"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download macOS checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate-tag.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
          curl -fsSL "${BASE_URL}/maxx-macOS-arm64.dmg.sha256" -o arm64.sha256
          curl -fsSL "${BASE_URL}/maxx-macOS-amd64.dmg.sha256" -o amd64.sha256

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.validate-tag.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"

          ARM64_SHA=$(tr -d '\n\r' < arm64.sha256)
          AMD64_SHA=$(tr -d '\n\r' < amd64.sha256)

          if [[ ! "$ARM64_SHA" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Error: invalid arm64 checksum: $ARM64_SHA"
            exit 1
          fi

          if [[ ! "$AMD64_SHA" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "Error: invalid amd64 checksum: $AMD64_SHA"
            exit 1
          fi

          cat > maxx.rb << CASK_EOF
          cask "maxx" do
            version "${VERSION_NUM}"

            name "maxx"
            desc "maxx"
            if Hardware::CPU.intel?
              url "https://github.com/awsl-project/maxx/releases/download/v#{version}/maxx-macOS-amd64.dmg"
              sha256 "${AMD64_SHA}"
            else
              url "https://github.com/awsl-project/maxx/releases/download/v#{version}/maxx-macOS-arm64.dmg"
              sha256 "${ARM64_SHA}"
            end

            homepage "https://github.com/awsl-project/maxx"

            app "maxx.app"
          end
          CASK_EOF

          git clone https://git:${GH_TOKEN}@github.com/awsl-project/homebrew-awsl.git
          cp maxx.rb homebrew-awsl/Casks/maxx.rb

          cd homebrew-awsl
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/maxx.rb
          git commit -m "Update maxx to ${VERSION}" || echo "No changes to commit"
          git push
